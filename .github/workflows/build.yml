name: build-test
on: [push]
jobs:
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: TheMrMilchmann/setup-msvc-dev@v4.0.0
        with:
          arch: x64
      - name: 生成 CMake 缓存
        shell: cmd
        run: |
          cmake -S. -B build -G Ninja
      - name: 编译
        shell: cmd
        run: |
          cmake --build build
      - name: 上传 Windows 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/
          retention-days: 30

  test-osx:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: 生成 CMake 缓存
        run: |
          cmake -S. -B build -G Ninja
      - name: 编译
        run: |
          cmake --build build
      - name: 上传 macOS 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: build/
          retention-days: 30

  test-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: 生成 CMake 缓存
        run: |
          cmake -S. -B build -G Ninja
      - name: 编译
        run: |
          cmake --build build
      - name: 上传 Ubuntu 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-build
          path: build/
          retention-days: 30