name: test
on: [push, workflow_dispatch]
jobs:
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: TheMrMilchmann/setup-msvc-dev@v4.0.0
        with:
          arch: x64
      - name: 测试构建环境
        shell: cmd
        run: |
          cmake --version
          cl
          ninja --version
          vcpkg --version
          echo %vcpkg_root%

  test-osx:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: 测试构建环境
        run: |
          cmake --version
          clang -v
          ninja --version
          vcpkg --version
          echo ${vcpkg_root}

  test-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: 测试构建环境
        run: |
          cmake --version
          g++ --version
          ninja --version
          vcpkg --version
          echo ${vcpkg_root}